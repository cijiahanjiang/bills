<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账单统计</title>

    <!-- CSS 引用 -->
    <link rel="stylesheet" type="text/css" href="./datatbles/datatables.css">
    <link rel="stylesheet" type="text/css" href="./datatbles/Buttons-2.2.3/css/buttons.dataTables.min.css">
    <link rel="stylesheet" type="text/css" href="./datatbles/Select-1.4.0/css/select.dataTables.min.css">
    <link rel="stylesheet" type="text/css" href="./datatbles/DateTime-1.1.2/css/dataTables.dateTime.min.css">
    <link rel="stylesheet" type="text/css" href="./css/editor.dataTables.min.css">
    <link rel="stylesheet" type="text/css" href="./css/editor.bootstrap4.css">
    <link rel="stylesheet" type="text/css" href="./css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="./css/dataTables.bootstrap4.min.css">

    <style>
        /* ========== 查询面板样式（完全隔离） ========== */
        .query-wrapper {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin: 20px;
            padding: 20px;
        }

        .query-wrapper .panel-title {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
        }

        /* 查询面板内的表单控件 */
        .query-wrapper .form-group {
            margin-bottom: 15px;
        }

        .query-wrapper .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: #555;
            margin-bottom: 5px;
            display: block;
        }

        .query-wrapper .form-control {
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
            transition: all 0.2s;
            width: 100%;
        }

        .query-wrapper .form-control:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
            outline: none;
        }

        .query-wrapper select.form-control {
            height: 38px;
            padding: 6px 10px;
        }

        /* 查询面板按钮 */
        .query-wrapper .btn-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 4px rgba(102, 126, 234, 0.3);
        }

        .query-wrapper .btn-custom:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.4);
        }

        /* 上传模块 */
        .query-wrapper .upload-section {
            background: #f8f9fa;
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 0;
        }

        .query-wrapper .upload-hint {
            font-size: 12px;
            color: #e74c3c;
            margin-top: 8px;
            line-height: 1.5;
        }

        .query-wrapper .btn-upload {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .query-wrapper .btn-upload:hover {
            opacity: 0.9;
        }

        /* 查询按钮对齐 */
        .query-wrapper .query-actions {
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            height: 100%;
            padding-bottom: 15px;
        }

        /* ========== 原始页面样式（保持不变） ========== */
        .bbutton {
            border-width: 1px;
        }

        .bmargin-left {
            margin-left: 10px;
        }

        /* 弹窗模式（有 DTE_Body） */
        .DTE_Body .DTE_Field_Type_checkbox .DTE_Field_InputControl {
            max-height: 200px !important;
            overflow-y: auto !important;
            border: 1px solid #ddd !important;
            padding: 10px !important;
        }

        /* 行内编辑保持默认 */
        .DTE_Field_Type_checkbox .DTE_Field_InputControl {
            max-height: none;
            overflow-y: visible;
        }

        /* ========== 响应式（仅查询面板） ========== */
        @media (max-width: 768px) {
            .query-wrapper .query-actions {
                justify-content: flex-start;
                margin-top: 15px;
            }
        }
    </style>
    <base target="_blank">
</head>
<body>
<!-- 查询面板（样式隔离在此容器内） -->
<div class="query-wrapper">
    <div class="panel-title">
        <span>📊</span> 账单查询与导入
    </div>

    <!-- 第一行：用户信息和文件上传 -->
    <div class="row">
        <div class="col-md-6 col-sm-6">
            <div class="col-md-2">
                <div class="form-group">
                    <label for="username">昵称</label>
                    <input type="text" class="form-control" id="username" placeholder="输入昵称" onkeydown="initUserData()">
                </div>
            </div>
            <div class="col-md-12">
                <div class="form-group">
                    <label for="items">标签管理</label>
                    <input type="text" class="form-control" id="items" placeholder="事项，英文逗号隔开" onkeydown="updateItems()">
                </div>
            </div>
        </div>
        <div class="col-md-6 col-sm-12">
            <div class="upload-section">
                <div class="row align-items-center">
                    <div class="col-md-5 col-sm-12">
                        <input type="file" class="form-control-file" id="records_file" style="font-size: 13px;">
                    </div>
                    <div class="col-md-3 col-sm-6">
                        <select class="form-control" id="channel">
                            <option>微信</option>
                            <option>支付宝</option>
                        </select>
                    </div>
                    <div class="col-md-4 col-sm-6">
                        <button class="btn-upload" onclick="uploadFile()">
                            <span>📤</span> 上传账单
                        </button>
                    </div>
                </div>
                <div class="upload-hint" style="margin-top: 35px">
                    <div>💡 微信导出：钱包 → 账单 → 常见问题 → 下载账单 → 用于个人对账</div>
                    <div>💡 支付宝导出：网页版 → 交易记录 → 切换到高级版 → 下载Excel</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 第二行：时间范围和金额筛选 -->
    <div class="row" style="margin-top: 15px">
        <div class="col-md-2 col-sm-6">
            <div class="form-group">
                <label for="stime">开始时间</label>
                <input type="date" class="form-control" id="stime">
            </div>
        </div>
        <div class="col-md-2 col-sm-6">
            <div class="form-group">
                <label for="etime">结束时间</label>
                <input type="date" class="form-control" id="etime">
            </div>
        </div>
        <div class="col-md-2 col-sm-6">
            <div class="form-group">
                <label for="minAmount">最低金额</label>
                <input type="number" class="form-control" id="minAmount" placeholder="0.00">
            </div>
        </div>
        <div class="col-md-2 col-sm-6">
            <div class="form-group">
                <label for="maxAmount">最高金额</label>
                <input type="number" class="form-control" id="maxAmount" placeholder="不限">
            </div>
        </div>
        <div class="col-md-2 col-sm-6">
            <div class="form-group">
                <label for="flowTypeCondition">收支类型</label>
                <select class="form-control" id="flowTypeCondition">
                    <option>全部</option>
                </select>
            </div>
        </div>
        <div class="col-md-2 col-sm-6">
            <div class="form-group">
                <label for="recurringCondition">周期性</label>
                <select class="form-control" id="recurringCondition">
                    <option>全部</option>
                </select>
            </div>
        </div>
    </div>

    <!-- 第三行：关键词和分类筛选 -->
    <div class="row">
        <div class="col-md-2 col-sm-6">
            <div class="form-group">
                <label for="product">产品关键词</label>
                <input type="text" class="form-control" id="product" placeholder="搜索产品...">
            </div>
        </div>
        <div class="col-md-2 col-sm-6">
            <div class="form-group">
                <label for="dealer">交易方</label>
                <input type="text" class="form-control" id="dealer" placeholder="搜索交易方...">
            </div>
        </div>
        <div class="col-md-2 col-sm-6">
            <div class="form-group">
                <label for="topTypeCondition">分类</label>
                <select class="form-control" id="topTypeCondition">
                    <option>全部</option>
                </select>
            </div>
        </div>
        <div class="col-md-2 col-sm-6">
            <div class="form-group">
                <label for="necessityCondition">必要性</label>
                <select class="form-control" id="necessityCondition">
                    <option>全部</option>
                </select>
            </div>
        </div>
        <div class="col-md-2 col-sm-6">
            <div class="form-group">
                <label for="itemsCondition">项目</label>
                <select class="form-control" id="itemsCondition">
                    <option>全部</option>
                </select>
            </div>
        </div>
        <div class="col-md-2 col-sm-12">
            <div class="query-actions">
                <button class="btn-custom" onclick="query()">
                    <span>🔍</span> 查询
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 图表区域（完全保持原始，不受上面样式影响） -->
<div id="charts">
    <span id="main1" style="width: 30%;height:400px;display: inline-block;margin-left: 10px"></span>
    <span id="main2" style="width: 15%;height:400px;display: inline-block"></span>
    <span id="main3" style="width: 15%;height:400px;display: inline-block"></span>
    <span id="main4" style="width: 15%;height:400px;display: inline-block"></span>
    <span id="main5" style="width: 15%;height:400px;display: inline-block"></span>
</div>

<!-- 表格区域（保持原始） -->
<table id="bill" class="display" style="width:100%;margin: 10px">
    <thead>
    <tr>
        <th>id</th>
        <th>收支</th>
        <th>金额</th>
        <th>周期性</th>
        <th>分类</th>
        <th>事项</th>
        <th>必要性</th>
        <th>产品</th>
        <th>位置</th>
        <th>交易时间</th>
        <th>交易方</th>
        <th>交易类型</th>
        <th>操作</th>
    </tr>
    </thead>
</table>

<!-- JavaScript 引用 -->
<script src="./js/jquery-3.5.1.js"></script>
<script src="./datatbles/datatables.js"></script>
<script src="./datatbles/Buttons-2.2.3/js/dataTables.buttons.min.js"></script>
<script src="./datatbles/Select-1.4.0/js/dataTables.select.min.js"></script>
<script src="./datatbles/DateTime-1.1.2/js/dataTables.dateTime.min.js"></script>
<script src="./js/dataTables.editor.min.js"></script>
<script src="./datatbles/dataTables.bootstrap4.min.js"></script>
<script src="./js/bootstrap.bundle.min.js"></script>
<script src="./js/echarts.js"></script>
<script src="./js/moment.js"></script>

<!-- 业务逻辑 JS -->
<script src="./js/bill.js"></script>
</body>
</html>
